name: hiterm
options:
  bundleIdPrefix: com.hiterm
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  hiterm:
    type: application
    platform: macOS
    sources:
      - path: hiterm
        excludes:
          - "*.xcodeproj"
    postCompileScripts:
      - script: |
          cp "${PROJECT_DIR}/hiterm/Resources/ghostty-config" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/ghostty-config"
          mkdir -p "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/zsh-integration"
          cp "${PROJECT_DIR}/hiterm/Resources/zsh-integration/.zshenv" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/zsh-integration/.zshenv"
          # Copy ghostty resources (themes, terminfo) for runtime theme resolution.
          GHOSTTY_SHARE="${PROJECT_DIR}/libs/GhosttyKit/share"
          if [ -d "${GHOSTTY_SHARE}/ghostty/themes" ]; then
            mkdir -p "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/ghostty/themes"
            cp -R "${GHOSTTY_SHARE}/ghostty/themes/" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/ghostty/themes/"
          fi
          if [ -d "${GHOSTTY_SHARE}/terminfo" ]; then
            mkdir -p "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/terminfo"
            cp -R "${GHOSTTY_SHARE}/terminfo/" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/terminfo/"
          fi
        name: Copy config resources
      - script: |
          if which swiftlint >/dev/null; then
            cd "${PROJECT_DIR}" && swiftlint lint --config .swiftlint.yml hiterm || true
          fi
        name: SwiftLint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hiterm.app
        PRODUCT_NAME: hiterm
        INFOPLIST_FILE: hiterm/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: ""
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/libs/GhosttyKit/lib"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/libs/GhosttyKit/include"
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/libs/GhosttyKit/include"
        OTHER_LDFLAGS:
          - "-lghostty"
          - "-lc++"
          - "-liconv"
          - "-lz"
          - "-framework Carbon"
          - "-framework CoreFoundation"
          - "-framework CoreGraphics"
          - "-framework CoreText"
          - "-framework CoreVideo"
          - "-framework QuartzCore"
          - "-framework IOSurface"
          - "-framework Metal"
          - "-framework AppKit"
          - "-framework Foundation"
        OTHER_SWIFT_FLAGS:
          - "-Xcc"
          - "-fmodule-map-file=$(PROJECT_DIR)/libs/GhosttyKit/include/module.modulemap"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
    dependencies: []
    info:
      path: hiterm/App/Info.plist
      properties:
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
    entitlements:
      path: hiterm/App/hiterm.entitlements
    preBuildScripts: []
    scheme:
      testTargets:
        - hitermTests
      gatherCoverageData: false

  hitermTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: hitermTests
    dependencies:
      - target: hiterm
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/hiterm.app/Contents/MacOS/hiterm"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/libs/GhosttyKit/include"
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/libs/GhosttyKit/include"
        OTHER_SWIFT_FLAGS:
          - "-Xcc"
          - "-fmodule-map-file=$(PROJECT_DIR)/libs/GhosttyKit/include/module.modulemap"
